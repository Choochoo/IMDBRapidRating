name: Deploy IMDb Rapid Rating via Octopus

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: imdb-rapid-rating-deploy
  cancel-in-progress: false

env:
  NODE_VERSION: '22'
  OCTOPUS_PROJECT: 'IMDBRapidRating'
  OCTOPUS_SPACE: 'Default'
  PACKAGE_ID: 'IMDBRapidRating'

jobs:
  build:
    runs-on: self-hosted
    name: Build IMDb Rapid Rating

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate deployment credentials
        env:
          POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
          TMDB_BUILD_API_KEY: ${{ secrets.TMDB_BUILD_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:POSTGRES_CONNECTION_STRING)) {
            throw 'POSTGRES_CONNECTION_STRING is required. Add it as a GitHub Actions repository secret before deploying.'
          }
          if ([string]::IsNullOrWhiteSpace($env:TMDB_BUILD_API_KEY)) {
            throw 'TMDB_BUILD_API_KEY is required. Add it as a GitHub Actions repository secret before deploying.'
          }
        shell: powershell

      - name: Cache IMDb source datasets
        uses: actions/cache@v5
        with:
          path: cache/*.tsv.gz
          key: imdb-source-datasets-v1

      - name: Install dependencies
        run: npm ci
        shell: powershell

      - name: Validate application
        run: |
          npm run check
          if ($LASTEXITCODE -ne 0) {
            throw 'Syntax validation failed.'
          }
          npm test
          if ($LASTEXITCODE -ne 0) {
            throw 'Tests failed.'
          }
          npm run build
          if ($LASTEXITCODE -ne 0) {
            throw 'Frontend build failed.'
          }
          npm audit --omit=dev
          if ($LASTEXITCODE -ne 0) {
            throw 'Production dependency audit failed.'
          }
        shell: powershell

      - name: Generate movie and TV datasets
        run: npm run build:data
        shell: powershell

      - name: Enrich title metadata
        env:
          POSTGRES_CONNECTION_STRING: ${{ secrets.POSTGRES_CONNECTION_STRING }}
          TMDB_BUILD_API_KEY: ${{ secrets.TMDB_BUILD_API_KEY }}
        run: |
          npm run build:origins
          if ($LASTEXITCODE -ne 0) {
            throw 'TMDB metadata enrichment failed.'
          }
        shell: powershell

      - name: Stage deployment package
        shell: powershell
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'imdb-rapid-rating-package'
          if (Test-Path $staging) {
            Remove-Item $staging -Recurse -Force
          }
          New-Item -Path $staging -ItemType Directory -Force | Out-Null

          foreach ($file in (git ls-files)) {
            $destination = Join-Path $staging $file
            New-Item -Path (Split-Path $destination -Parent) -ItemType Directory -Force | Out-Null
            Copy-Item -LiteralPath $file -Destination $destination -Force
          }

          New-Item -Path (Join-Path $staging 'data') -ItemType Directory -Force | Out-Null
          Copy-Item -LiteralPath 'data\movies.json' -Destination (Join-Path $staging 'data\movies.json') -Force
          Copy-Item -LiteralPath 'data\shows.json' -Destination (Join-Path $staging 'data\shows.json') -Force
          Copy-Item -LiteralPath 'dist' -Destination (Join-Path $staging 'dist') -Recurse -Force

          if (-not (Test-Path (Join-Path $staging 'scripts\server.mjs'))) {
            throw 'Package staging failed: scripts/server.mjs is missing.'
          }
          if (-not (Test-Path (Join-Path $staging 'data\movies.json'))) {
            throw 'Package staging failed: data/movies.json is missing.'
          }
          if (-not (Test-Path (Join-Path $staging 'data\shows.json'))) {
            throw 'Package staging failed: data/shows.json is missing.'
          }
          if (-not (Test-Path (Join-Path $staging 'dist\index.html'))) {
            throw 'Package staging failed: dist/index.html is missing.'
          }

          "STAGING_PATH=$staging" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: imdb-rapid-rating-package
          path: ${{ runner.temp }}/imdb-rapid-rating-package
          retention-days: 2

  deploy:
    runs-on: self-hosted
    name: Deploy through Octopus
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: imdb-rapid-rating-package
          path: deploy-package

      - name: Verify Octopus CLI
        shell: powershell
        run: |
          $octoPath = 'C:\Program Files\Octopus CLI\octo.exe'
          if (-not (Test-Path $octoPath)) {
            throw "Octopus CLI not found at $octoPath"
          }
          (Split-Path $octoPath -Parent) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & $octoPath version

      - name: Package build output
        shell: powershell
        run: |
          $version = "1.0.${{ github.run_number }}"
          $package = "${{ env.PACKAGE_ID }}.$version.zip"
          Compress-Archive -Path 'deploy-package\*' -DestinationPath $package -Force
          "PACKAGE_PATH=$package" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Created $package ($((Get-Item $package).Length) bytes)"

      - name: Push package to Octopus
        shell: powershell
        run: |
          octo push `
            --package "${{ env.PACKAGE_PATH }}" `
            --server "${{ secrets.OCTOPUS_SERVER_URL }}" `
            --apiKey "${{ secrets.OCTOPUS_API_KEY }}" `
            --space "${{ env.OCTOPUS_SPACE }}" `
            --replace-existing

      - name: Sync Octopus deployment process
        shell: powershell
        env:
          OCTOPUS_SERVER_URL: ${{ secrets.OCTOPUS_SERVER_URL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUS_API_KEY }}
        run: |
          & '.\deploy-package\scripts\setup-octopus-project.ps1' `
            -OctopusUrl $env:OCTOPUS_SERVER_URL `
            -ApiKey $env:OCTOPUS_API_KEY `
            -SpaceName '${{ env.OCTOPUS_SPACE }}'

      - name: Create and deploy release
        shell: powershell
        run: |
          octo create-release `
            --project "${{ env.OCTOPUS_PROJECT }}" `
            --version "${{ env.PACKAGE_VERSION }}" `
            --packageVersion "${{ env.PACKAGE_VERSION }}" `
            --server "${{ secrets.OCTOPUS_SERVER_URL }}" `
            --apiKey "${{ secrets.OCTOPUS_API_KEY }}" `
            --space "${{ env.OCTOPUS_SPACE }}" `
            --deployTo 'Production' `
            --progress `
            --ignoreexisting

      - name: Deployment summary
        shell: powershell
        run: |
          Write-Host 'IMDb Rapid Rating deployment complete.' -ForegroundColor Green
          Write-Host "Version: ${{ env.PACKAGE_VERSION }}"
          Write-Host 'Path: C:\inetpub\wwwroot\IMDBRapidRating'
